                                                                onClick={() => handleSimulateCombined()}
                                                                disabled={isSimulatingCombined}
                                                                style={{ padding: '6px 16px', background: isSimulatingCombined ? '#6c757d' : '#27ae60', color: 'white', border: 'none', borderRadius: '6px', cursor: isSimulatingCombined ? 'not-allowed' : 'pointer', fontWeight: 'bold', fontSize: '12px', boxShadow: '0 2px 4px rgba(39,174,96,0.2)', minWidth: '140px' }}
                                                            >
                                                                {isSimulatingCombined ? '⌛ Simulating...' : 'Simulate Combined'}
                                                            </button>
                                                        </div>
                                                    </div>

                                                    {!superpositionResult.error && (
                                                        <div style={{ display: 'flex', gap: '30px', borderTop: '1px solid rgba(0,0,0,0.05)', paddingTop: '12px' }}>
                                                            <div style={{ flex: 1, borderRight: '1px solid rgba(0,0,0,0.05)', paddingRight: '15px' }}>
                                                                <div style={{ fontSize: '11px', fontWeight: 700, color: '#666', textTransform: 'uppercase', marginBottom: '8px', letterSpacing: '0.5px' }}>Estimated Effect</div>
                                                                <div style={{ fontSize: '13px', marginBottom: '4px' }}>
                                                                    Estimated Max Loading: <strong style={{ color: superpositionResult.max_rho <= monitoringFactor ? '#28a745' : '#d35400', fontSize: '16px' }}>{(superpositionResult.max_rho * 100).toFixed(1)}%</strong>
                                                                </div>
                                                                <div style={{ fontSize: '12px', color: '#666' }}>
                                                                    Line: {superpositionResult.max_rho_line}
                                                                </div>
                                                            </div>
                                                            <div style={{ flex: 1 }}>
                                                                <div style={{ fontSize: '11px', fontWeight: 700, color: '#666', textTransform: 'uppercase', marginBottom: '8px', letterSpacing: '0.5px' }}>Simulation Result</div>
                                                                {isSimulatingCombined && (
                                                                    <div style={{ color: '#0056b3', fontSize: '13px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                                        <span>⌛</span> Simulating combined action...
                                                                    </div>
                                                                )}
                                                                {!isSimulatingCombined && combinedSimulationFeedback && (
                                                                    <>
                                                                        <div style={{ fontSize: '13px', marginBottom: '4px' }}>
                                                                            Actual Max Loading: <strong style={{ color: (combinedSimulationFeedback.max_rho ?? 1) <= monitoringFactor ? '#28a745' : '#d35400', fontSize: '16px' }}>{combinedSimulationFeedback.max_rho != null ? `${(combinedSimulationFeedback.max_rho * 100).toFixed(1)}%` : 'N/A'}</strong>
                                                                        </div>
                                                                        <div style={{ fontSize: '12px', color: '#666' }}>
                                                                            Line: {combinedSimulationFeedback.max_rho_line}
                                                                        </div>
                                                                        {combinedSimulationFeedback.is_islanded && (
                                                                            <div style={{ fontSize: '11px', color: '#dc3545', marginTop: '6px', fontWeight: 600, background: '#fff5f5', padding: '2px 8px', borderRadius: '4px', display: 'inline-block' }}>
                                                                                Islanding detected ({combinedSimulationFeedback.disconnected_mw?.toFixed(1)} MW disconnected)
                                                                            </div>
                                                                        )}
                                                                        {combinedSimulationFeedback.non_convergence && (
                                                                            <div style={{ fontSize: '11px', color: '#dc3545', marginTop: '6px', fontWeight: 600, background: '#fff5f5', padding: '2px 8px', borderRadius: '4px', display: 'inline-block' }}>
                                                                                Non-convergence: {combinedSimulationFeedback.non_convergence}
                                                                            </div>
                                                                        )}
                                                                    </>
                                                                )}
                                                                {!isSimulatingCombined && !combinedSimulationFeedback && (
                                                                    <div style={{ color: '#aaa', fontSize: '12px', fontStyle: 'italic', marginTop: '5px' }}>Click "Simulate Combined" to run</div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    )}
                                                    {superpositionResult.error && (
                                                        <div style={{ fontSize: '13px', color: '#856404' }}>{superpositionResult.error}</div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}

                                <div className="modal-footer">
                                    <button onClick={() => setIsCombineModalOpen(false)} style={{ background: '#95a5a6', color: 'white', padding: '8px 20px', border: 'none', borderRadius: '4px', cursor: 'pointer' }}>Close</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div >
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
