                setOriginalViewBox(null);
                // Analysis
                setResult(null); setPendingAnalysisResult(null);
                setSelectedActionId(null);
                setManualActionIds(new Set()); setManuallyAddedIds(new Set()); setRejectedActionIds(new Set()); setSuggestedByRecommenderIds(new Set());
                setAnalysisLoading(false); setAnalysisRan(false);
                // Analysis flow
                setSelectedOverloads(new Set()); setMonitorDeselected(false);
                // Visualization
                setActiveTab('n'); setActionViewMode('network');
                setVlOverlay(null); setN1Loading(false);
                // Branch / contingency
                setSelectedBranch(''); committedBranchRef.current = '';
                setInspectQuery('');
                // Warnings
                setShowMonitoringWarning(false);
                setDismissedSelectedWarning(false); setDismissedRejectedWarning(false); setDismissedRecommenderWarning(false);
                // Refs
                lastViewStateN.current = null; lastViewStateN1.current = null;
                lastZoomState.current = { query: '', branch: '' };

                try {
                    const configRes = await axios.post(API_BASE + '/api/config', {
                        network_path: networkPath,
                        action_file_path: actionPath,
                        layout_path: layoutPath,
                        min_line_reconnections: minLineReconnections,
                        min_close_coupling: minCloseCoupling,
                        min_open_coupling: minOpenCoupling,
                        min_line_disconnections: minLineDisconnections,
                        min_pst: minPst,
                        n_prioritized_actions: nPrioritizedActions,
                        lines_monitoring_path: linesMonitoringPath,
                        monitoring_factor: monitoringFactor,
                        pre_existing_overload_threshold: preExistingOverloadThreshold,
                        ignore_reconnections: ignoreReconnections,
                        pypowsybl_fast_mode: pypowsyblFastMode
                    });


                    if (configRes.data && configRes.data.total_lines_count !== undefined) {
                        setMonitoredLinesCount(configRes.data.monitored_lines_count);
                        setTotalLinesCount(configRes.data.total_lines_count);
                        if (configRes.data.monitored_lines_count < configRes.data.total_lines_count) {
                            setShowMonitoringWarning(true);
                        }
                    }
                    if (configRes.data?.action_dict_file_name) { setActionDictFileName(configRes.data.action_dict_file_name); setShowActionDictWarning(true); }
                    if (configRes.data?.action_dict_stats) setActionDictStats(configRes.data.action_dict_stats);

                    const [branchesRes, vlRes, nomVRes] = await Promise.all([
                        axios.get(API_BASE + '/api/branches'),
                        axios.get(API_BASE + '/api/voltage-levels'),
                        axios.get(API_BASE + '/api/nominal-voltages')
                    ]);

                    setBranches(branchesRes.data.branches);
                    setVoltageLevels(vlRes.data.voltage_levels);

                    // Set up nominal voltage filter
                    const nvMap = nomVRes.data.mapping;
                    const uniqueKv = nomVRes.data.unique_kv;
                    setNominalVoltageMap(nvMap);
                    setUniqueVoltages(uniqueKv);
                    if (uniqueKv.length > 0) {
                        setVoltageRange([uniqueKv[0], uniqueKv[uniqueKv.length - 1]]);
                    }

                    fetchBaseDiagram(vlRes.data.voltage_levels.length);
                } catch (err) {
                    setError('Failed to load config: ' + (err.response?.data?.detail || err.message));
                } finally { setConfigLoading(false); }
            };

            // We no longer automatically reload config when settings close, 
            // the user must explicitly click Apply in settings.

            const processSvg = (rawSvg, vlCount) => {
                try {
                    const match = rawSvg.match(/viewBox=["']([^"']+)["']/);
                    let vb = null;
                    if (match) {
                        const parts = match[1].split(/\s+|,/).map(parseFloat);
                        if (parts.length === 4) vb = { x: parts[0], y: parts[1], w: parts[2], h: parts[3] };
                    }

                    const svgTag = rawSvg.match(/<svg[^>]*>/)?.[0] || '';
                    const widthMatch = svgTag.match(/\bwidth=["']([^"']+)["']/);
                    const heightMatch = svgTag.match(/\bheight=["']([^"']+)["']/);
                    console.log(`[SVG processSvg] vlCount=${vlCount}, viewBox=${vb ? `${vb.w.toFixed(0)}x${vb.h.toFixed(0)}` : 'none'} @ ${widthMatch?.[1] || 'none'}x${heightMatch?.[1] || 'none'}`);

                    const svg = boostSvgForLargeGrid(rawSvg, vb, vlCount);
                    return { svg, viewBox: vb };
                } catch (err) {
                    console.error('[processSvg] error:', err);
                    return { svg: rawSvg, viewBox: null };
                }
            };
            const handleManualZoomIn = () => {
                const currentPZ = activeTab === 'action' ? actionPZ : activeTab === 'n' ? nPZ : n1PZ;
                const vb = currentPZ?.viewBox;
                if (currentPZ && vb) {
                    const scale = 0.8;
                    currentPZ.setViewBox({
                        x: vb.x + vb.w * (1 - scale) / 2,
                        y: vb.y + vb.h * (1 - scale) / 2,
                        w: vb.w * scale,
                        h: vb.h * scale,
                    });
                }
            };

            const handleManualZoomOut = () => {
                const currentPZ = activeTab === 'action' ? actionPZ : activeTab === 'n' ? nPZ : n1PZ;
                const vb = currentPZ?.viewBox;
                if (currentPZ && vb) {
                    const scale = 1.25;
                    currentPZ.setViewBox({
                        x: vb.x + vb.w * (1 - scale) / 2,
                        y: vb.y + vb.h * (1 - scale) / 2,
                        w: vb.w * scale,
                        h: vb.h * scale,
                    });
                }
            };

            const handleManualReset = () => {
                setInspectQuery('');

                const currentPZ = activeTab === 'action' ? actionPZ : activeTab === 'n' ? nPZ : n1PZ;
                const currentDiagram = activeTab === 'action' ? actionDiagram : activeTab === 'n' ? nDiagram : n1Diagram;
                const viewBox = currentDiagram?.originalViewBox || originalViewBox;

                if (currentPZ && viewBox) {
                    currentPZ.setViewBox(viewBox);
                    lastZoomState.current = { query: '', branch: '' };
                }

                // Clear highlights
                const container = activeTab === 'action' ? actionSvgContainerRef.current
                    : activeTab === 'n' ? nSvgContainerRef.current : n1SvgContainerRef.current;
                if (container) {
                    container.querySelectorAll('.nad-highlight').forEach(el => el.classList.remove('nad-highlight'));
                }
            };

            const fetchBaseDiagram = async (vlCount) => {
                try {
                    const res = await axios.get(API_BASE + '/api/network-diagram');
                    const { svg, viewBox } = processSvg(res.data.svg, vlCount || 0);
                    if (viewBox) setOriginalViewBox(viewBox);
                    setNDiagram({ ...res.data, svg, originalViewBox: viewBox });
                } catch (err) { console.error('Failed to fetch diagram:', err); }
            };

            // Check if there is any analysis state that would be lost on contingency change
            const hasAnalysisState = () => {
                return !!(result || pendingAnalysisResult || selectedActionId || actionDiagram || manuallyAddedIds.size > 0 || manualActionIds.size > 0 || rejectedActionIds.size > 0);
            };

            // Clear all contingency-related analysis state (preserves network/config)
            const clearContingencyState = () => {
                setResult(null);
                setPendingAnalysisResult(null);
                setSelectedActionId(null);
                setManualActionIds(new Set());
                setManuallyAddedIds(new Set());
                setRejectedActionIds(new Set());
                setSuggestedByRecommenderIds(new Set());
                setActionDiagram(null);
                setN1Diagram(null);
                setActiveTab('n');
                setVlOverlay(null);
                setAnalysisRan(false);
                setError('');
                setInfoMessage('');
                setInspectQuery('');
                setDismissedSelectedWarning(false);
                setDismissedRejectedWarning(false);
                setDismissedRecommenderWarning(false);
                lastZoomState.current = { query: '', branch: '' };
                setAvailableOverloads([]);
                setSelectedOverloads(new Set());
                setMonitorDeselected(false);
            };

            // Fetch N-1 Diagram when contingency is selected (ONLY if valid branch)
            // When switching contingency with existing analysis state, prompt for confirmation.
            useEffect(() => {
                if (!selectedBranch) {
                    setN1Diagram(null);
                    committedBranchRef.current = '';
                    return;
                }

                // Prevent fetching if the branch is not in the valid list (e.g. user is still typing)
                if (branches.length > 0 && !branches.includes(selectedBranch)) {
                    return;
                }

                // Valid branch selected — check if we need confirmation before switching
                // Skip dialog during session restore (restoringSessionRef is cleared after the branch effect runs)
                if (selectedBranch !== committedBranchRef.current && hasAnalysisState() && !restoringSessionRef.current) {
                    if (!window.confirm("Changing contingency will clear all previous analysis results, manual simulations, and action selections. The network state will be preserved.\n\nDo you want to continue?")) {
                        // User cancelled — revert input to the committed branch
                        setSelectedBranch(committedBranchRef.current);
                        return;
                    }
                    // User confirmed — clear analysis state
                    clearContingencyState();
                }

                // Clear the restoring flag after the first branch effect pass
                restoringSessionRef.current = false;

                // Commit this branch and fetch the N-1 diagram
                committedBranchRef.current = selectedBranch;
                clearContingencyState();

                const fetchN1 = async () => {
                    setN1Loading(true);
                    setActiveTab('n-1'); // Switch immediately → shows "Generating N-1 Diagram..."
                    try {
                        const res = await axios.post(API_BASE + '/api/n1-diagram', { disconnected_element: selectedBranch });
                        const { svg, viewBox } = processSvg(res.data.svg, voltageLevels.length);
                        setN1Diagram({ ...res.data, svg, originalViewBox: viewBox }); // Embed viewBox
                    } catch (err) {
                        console.error("Failed to fetch N-1 diagram", err);
                        setError(`Failed to fetch N-1 diagram for ${selectedBranch}`);
                    } finally {
                        setN1Loading(false);
                    }
                };
                fetchN1();
            }, [selectedBranch, branches]);

            // Auto-switch to overflow tab when analysis runs
            // Sync available overloads from N-1 diagram for pre-selection
            useEffect(() => {
                if (n1Diagram && n1Diagram.lines_overloaded) {
                    setAvailableOverloads(n1Diagram.lines_overloaded);
                    setSelectedOverloads(new Set(n1Diagram.lines_overloaded));
                } else {
                    setAvailableOverloads([]);
                    setSelectedOverloads(new Set());
                }
            }, [n1Diagram]);

            const handleSaveSession = async () => {
                const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                const contingencyLabel = selectedBranch ? `_${selectedBranch.replace(/[^a-zA-Z0-9_-]/g, '_')}` : '';
                const sessionName = `expertassist_session${contingencyLabel}_${ts}`;

                // Build the session JSON (same structure as the React app)
                const session = {
                    saved_at: new Date().toISOString(),
                    configuration: {
                        network_path: networkPath,
                        action_file_path: actionPath,
                        layout_path: layoutPath || '',
                        min_line_reconnections: minLineReconnections,
                        min_close_coupling: minCloseCoupling,
                        min_open_coupling: minOpenCoupling,
                        min_line_disconnections: minLineDisconnections,
                        min_pst: minPst ?? 1.0,
                        n_prioritized_actions: nPrioritizedActions,
                        lines_monitoring_path: linesMonitoringPath,
                        monitoring_factor: monitoringFactor,
                        pre_existing_overload_threshold: preExistingOverloadThreshold,
                        ignore_reconnections: ignoreReconnections,
                        pypowsybl_fast_mode: pypowsyblFastMode,
                    },
                    contingency: {
                        disconnected_element: selectedBranch,
                        selected_overloads: Array.from(selectedOverloads),
                        monitor_deselected: monitorDeselected,
                    },
                    overloads: {
                        n_overloads: nDiagram?.lines_overloaded ?? [],
                        n1_overloads: n1Diagram?.lines_overloaded ?? [],
                        resolved_overloads: result?.lines_overloaded ?? [],
                    },
                    overflow_graph: result?.pdf_url
                        ? { pdf_url: result.pdf_url, pdf_path: result.pdf_path ?? null }
                        : null,
                    analysis: result
                        ? {
                            message: result.message,
                            dc_fallback: result.dc_fallback,
                            action_scores: result.action_scores,
                            lines_we_care_about: result.lines_we_care_about || null,
                            actions: Object.fromEntries(
                                Object.entries(result.actions || {}).map(([id, detail]) => [
                                    id,
                                    {
                                        description_unitaire: detail.description_unitaire,
                                        rho_before: detail.rho_before,
                                        rho_after: detail.rho_after,
                                        max_rho: detail.max_rho,
                                        max_rho_line: detail.max_rho_line,
                                        is_rho_reduction: detail.is_rho_reduction,
                                        is_estimated: detail.is_estimated,
                                        non_convergence: detail.non_convergence,
                                        action_topology: detail.action_topology,
                                        estimated_max_rho: detail.estimated_max_rho,
                                        estimated_max_rho_line: detail.estimated_max_rho_line,
                                        is_islanded: detail.is_islanded,
                                        n_components: detail.n_components,
                                        disconnected_mw: detail.disconnected_mw,
                                        status: {
                                            is_selected: manualActionIds.has(id),
                                            is_suggested: suggestedByRecommenderIds.has(id),
                                            is_rejected: rejectedActionIds.has(id),
                                            is_manually_simulated: manuallyAddedIds.has(id),
                                        },
                                    },
                                ])
                            ),
                            combined_actions: (() => {
                                const saved = {};
                                if (result.combined_actions) {
                                    for (const [id, ca] of Object.entries(result.combined_actions)) {
                                        // Look up simulation data by both original key and canonical key
                                        const simData = result.actions?.[id] || result.actions?.[canonicalizeId(id)];
                                        const isSimulated = !!simData && !simData.is_estimated && simData.rho_after?.length > 0;
                                        saved[id] = {
                                            action1_id: ca.action1_id,
                                            action2_id: ca.action2_id,
                                            betas: ca.betas,
                                            max_rho: ca.max_rho,
                                            max_rho_line: ca.max_rho_line,
                                            is_rho_reduction: ca.is_rho_reduction,
                                            description: ca.description,
                                            estimated_max_rho: ca.estimated_max_rho ?? ca.max_rho,
                                            estimated_max_rho_line: ca.estimated_max_rho_line ?? ca.max_rho_line,
                                            is_islanded: ca.is_islanded,
                                            disconnected_mw: ca.disconnected_mw,
                                            simulated_max_rho: isSimulated ? simData.max_rho : null,
                                            simulated_max_rho_line: isSimulated ? simData.max_rho_line : undefined,
                                            is_simulated: isSimulated,
                                        };
                                    }
                                }
                                return saved;
                            })(),
                        }
                        : null,
                };

                if (outputFolderPath) {
                    try {
                        const res = await axios.post(API_BASE + '/api/save-session', {
                            session_name: sessionName,
                            json_content: JSON.stringify(session, null, 2),
                            pdf_path: result?.pdf_path ?? null,
                            output_folder_path: outputFolderPath,
                        });
                        const pdfMsg = res.data.pdf_copied ? " (including PDF)" : " (PDF not found)";
                        setInfoMessage(`SUCCESS: Session saved to: ${res.data.session_folder}${pdfMsg}`);
                    } catch (err) {
                        setError('Failed to save session: ' + (err.response?.data?.detail || err.message));
                    }
                } else {
                    // Fallback: browser download of JSON
                    const blob = new Blob([JSON.stringify(session, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${sessionName}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                }
            };

            // ===== Reload Session =====
            const [showReloadModal, setShowReloadModal] = useState(false);
            const [sessionList, setSessionList] = useState([]);
            const [sessionListLoading, setSessionListLoading] = useState(false);
            const [sessionRestoring, setSessionRestoring] = useState(false);

            const handleOpenReloadModal = async () => {
                if (!outputFolderPath) {
                    setError('Configure an Output Folder Path in Settings before reloading a session.');
                    return;
                }
                setShowReloadModal(true);
                setSessionListLoading(true);
                try {
                    const res = await axios.get(API_BASE + '/api/list-sessions', { params: { folder_path: outputFolderPath } });
                    setSessionList(res.data.sessions);
                } catch (err) {
                    setError('Failed to list sessions: ' + (err.response?.data?.detail || err.message));
                    setShowReloadModal(false);
                } finally {
                    setSessionListLoading(false);
                }
            };

            const handleRestoreSession = async (sessionName) => {
                if (!outputFolderPath) return;
                setSessionRestoring(true);
                try {
                    const res = await axios.post(API_BASE + '/api/load-session', { folder_path: outputFolderPath, session_name: sessionName });
                    const session = res.data;
                    const cfg = session.configuration;

                    // Restore config
                    setNetworkPath(cfg.network_path);
                    setActionPath(cfg.action_file_path);
                    setLayoutPath(cfg.layout_path || '');
                    setMinLineReconnections(cfg.min_line_reconnections);
                    setMinCloseCoupling(cfg.min_close_coupling);
                    setMinOpenCoupling(cfg.min_open_coupling);
                    setMinLineDisconnections(cfg.min_line_disconnections);
                    setMinPst(cfg.min_pst ?? 1.0);
                    setNPrioritizedActions(cfg.n_prioritized_actions);
                    setLinesMonitoringPath(cfg.lines_monitoring_path || '');
                    setMonitoringFactor(cfg.monitoring_factor);
                    setPreExistingOverloadThreshold(cfg.pre_existing_overload_threshold);
                    setIgnoreReconnections(cfg.ignore_reconnections ?? false);
                    setPypowsyblFastMode(cfg.pypowsybl_fast_mode ?? true);

                    // Load network and action dictionary on backend
                    const configRes = await axios.post(API_BASE + '/api/config', {
                        network_path: cfg.network_path,
                        action_file_path: cfg.action_file_path,
                        layout_path: cfg.layout_path,
                        min_line_reconnections: cfg.min_line_reconnections,
                        min_close_coupling: cfg.min_close_coupling,
                        min_open_coupling: cfg.min_open_coupling,
                        min_line_disconnections: cfg.min_line_disconnections,
                        min_pst: cfg.min_pst ?? 1.0,
                        n_prioritized_actions: cfg.n_prioritized_actions,
                        lines_monitoring_path: cfg.lines_monitoring_path,
                        monitoring_factor: cfg.monitoring_factor,
                        pre_existing_overload_threshold: cfg.pre_existing_overload_threshold,
                        ignore_reconnections: cfg.ignore_reconnections,
                        pypowsybl_fast_mode: cfg.pypowsybl_fast_mode,
                    });

                    // Process config response (action dictionary, monitoring info)
                    if (configRes.data && configRes.data.total_lines_count !== undefined) {
                        setMonitoredLinesCount(configRes.data.monitored_lines_count);
                        setTotalLinesCount(configRes.data.total_lines_count);
                        if (configRes.data.monitored_lines_count < configRes.data.total_lines_count) {
                            setShowMonitoringWarning(true);
                        }
                    }
                    if (configRes.data?.action_dict_file_name) { setActionDictFileName(configRes.data.action_dict_file_name); }
                    if (configRes.data?.action_dict_stats) setActionDictStats(configRes.data.action_dict_stats);

                    // Fetch branches, voltage levels, and nominal voltages in parallel
                    const [branchRes, vlRes, nomVRes] = await Promise.all([
                        axios.get(API_BASE + '/api/branches'),
                        axios.get(API_BASE + '/api/voltage-levels'),
                        axios.get(API_BASE + '/api/nominal-voltages'),
                    ]);
                    setBranches(branchRes.data.branches);
                    setVoltageLevels(vlRes.data.voltage_levels);

                    // Set up nominal voltage filter
                    const nvMap = nomVRes.data.mapping;
                    const uniqueKv = nomVRes.data.unique_kv;
                    setNominalVoltageMap(nvMap);
                    setUniqueVoltages(uniqueKv);
                    if (uniqueKv.length > 0) {
                        setVoltageRange([uniqueKv[0], uniqueKv[uniqueKv.length - 1]]);
                    }

                    // Fetch the base network diagram
                    fetchBaseDiagram(vlRes.data.voltage_levels.length);

                    // Restore analysis context (lines_we_care_about) so simulate uses same monitored lines
                    if (session.analysis?.lines_we_care_about) {
                        try {
                            await axios.post(API_BASE + '/api/restore-analysis-context', {
                                lines_we_care_about: session.analysis.lines_we_care_about,
                                disconnected_element: session.contingency.disconnected_element,
                                lines_overloaded: session.overloads?.resolved_overloads || null,
                                computed_pairs: session.analysis.computed_pairs || null,
                            });
                            const nCare = session.analysis.lines_we_care_about.length;
                            console.log(`[restore] Analysis context restored: ${nCare} monitored lines`);
                        } catch (ctxErr) {
                            console.warn('Failed to restore analysis context:', ctxErr);
                        }
                    }

                    // Restore contingency
                    setMonitorDeselected(session.contingency.monitor_deselected);
                    setSelectedOverloads(new Set(session.contingency.selected_overloads));

                    // Restore analysis result
                    if (session.analysis) {
                        const a = session.analysis;
                        const restoredActions = {};
                        const restoredSelected = new Set();
                        const restoredRejected = new Set();
                        const restoredManual = new Set();
                        const restoredSuggested = new Set();

                        for (const [id, entry] of Object.entries(a.actions)) {
                            // Skip estimation-only combined-pair entries
                            if (id.includes('+') && entry.is_estimated && !entry.status.is_manually_simulated) continue;
                            restoredActions[id] = {
                                description_unitaire: entry.description_unitaire,
                                rho_before: entry.rho_before,
                                rho_after: entry.rho_after,
                                max_rho: entry.max_rho,
                                max_rho_line: entry.max_rho_line,
                                is_rho_reduction: entry.is_rho_reduction,
                                is_estimated: entry.is_estimated,
                                non_convergence: entry.non_convergence,
                                action_topology: entry.action_topology,
                                estimated_max_rho: entry.estimated_max_rho,
                                estimated_max_rho_line: entry.estimated_max_rho_line,
                                is_islanded: entry.is_islanded,
                                n_components: entry.n_components,
                                disconnected_mw: entry.disconnected_mw,
                                is_manual: entry.status.is_manually_simulated,
                            };
                            if (entry.status.is_selected) restoredSelected.add(id);
                            if (entry.status.is_rejected) restoredRejected.add(id);
                            if (entry.status.is_manually_simulated) restoredManual.add(id);
                            if (entry.status.is_suggested) restoredSuggested.add(id);
                        }

                        const restoredCombinedActions = {};
                        if (a.combined_actions) {
                            for (const [id, ca] of Object.entries(a.combined_actions)) {
                                restoredCombinedActions[id] = {
                                    action1_id: ca.action1_id,
                                    action2_id: ca.action2_id,
                                    betas: ca.betas,
                                    p_or_combined: [],
                                    max_rho: ca.max_rho,
                                    max_rho_line: ca.max_rho_line,
                                    is_rho_reduction: ca.is_rho_reduction,
                                    description: ca.description,
                                    rho_after: [],
                                    rho_before: [],
                                    estimated_max_rho: ca.estimated_max_rho,
                                    estimated_max_rho_line: ca.estimated_max_rho_line,
                                    is_islanded: ca.is_islanded,
                                    disconnected_mw: ca.disconnected_mw,
                                };
                            }
                        }

                        setResult({
                            pdf_path: session.overflow_graph?.pdf_path ?? null,
                            pdf_url: session.overflow_graph?.pdf_url ?? null,
                            actions: restoredActions,
                            action_scores: a.action_scores,
                            lines_overloaded: session.overloads.resolved_overloads,
                            combined_actions: restoredCombinedActions,
                            message: a.message,
                            dc_fallback: a.dc_fallback,
                            lines_we_care_about: a.lines_we_care_about || null,
                        });
                        setManualActionIds(restoredSelected);
                        setRejectedActionIds(restoredRejected);
                        setManuallyAddedIds(restoredManual);
                        setSuggestedByRecommenderIds(restoredSuggested);
                    } else {
                        setResult(null);
                    }

                    // Set the restoring flag so the N-1 useEffect skips the contingency-change dialog
                    restoringSessionRef.current = true;
                    committedBranchRef.current = session.contingency.disconnected_element;
                    setSelectedBranch(session.contingency.disconnected_element);
                    setShowReloadModal(false);
                    // Build info message with monitoring details
                    let restoreMsg = `SUCCESS: Session "${sessionName}" restored`;
                    if (session.analysis?.lines_we_care_about) {
                        const nCare = session.analysis.lines_we_care_about.length;
                        restoreMsg += ` | Monitoring: ${nCare} lines restored from saved analysis context`;
                    } else {
                        restoreMsg += ` | WARNING: No saved monitoring context – simulations may use different monitored lines`;
                    }
                    setInfoMessage(restoreMsg);
                } catch (err) {
                    setError('Failed to restore session: ' + (err.response?.data?.detail || err.message));
                } finally {
                    setSessionRestoring(false);
                }
            };

            const handleRunAnalysis = async () => {
                if (!selectedBranch) return;
                setAnalysisLoading(true);
                setError('');
                setInfoMessage('');
                setAnalysisRan(false);
                setPendingAnalysisResult(null);
                setResult(prev => {
                    if (!prev) return null;
                    const manuals = {};
                    for (const [id, data] of Object.entries(prev.actions || {})) {
                        if (data.is_manual) manuals[id] = data;
                    }
                    return { ...prev, actions: manuals, lines_overloaded: [] };
                });

                try {
                    // Step 1: Detection
                    const response1 = await axios.post(API_BASE + '/api/run-analysis-step1', {
                        disconnected_element: selectedBranch
                    });
                    const res1 = response1.data;

                    if (!res1.can_proceed) {
                        setError(res1.message || 'Analysis cannot proceed.');
                        if (res1.message) setInfoMessage(res1.message);
                        setAnalysisLoading(false);
                        return;
                    }

                    const detected = res1.lines_overloaded || [];
                    setAvailableOverloads(detected);

                    // Resolve: selected overloads focus the analysis.
                    let primaryOverloads = detected;
                    if (selectedOverloads.size > 0) {
                        const stillRelevant = detected.filter(name => selectedOverloads.has(name));
                        if (stillRelevant.length > 0) {
                            primaryOverloads = stillRelevant;
                        } else {
                            setSelectedOverloads(new Set(detected));
                        }
                    } else {
                        setSelectedOverloads(new Set(detected));
                    }

                    // The backend knows which ones to monitor via the monitor_deselected flag.
                    // selected_overloads MUST only contain the ones we actually want to resolve.
                    const toResolve = primaryOverloads;

                    if (detected.length === 0) {
                        setInfoMessage(res1.message || "No overloads detected.");
                        setAnalysisRan(true);
                        setAnalysisLoading(false);
                        return;
                    }

                    // Step 2: Resolution
                    const response2 = await fetch(API_BASE + '/api/run-analysis-step2', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            selected_overloads: toResolve,
                            all_overloads: detected,
                            monitor_deselected: monitorDeselected,
                        })
                    });
                    if (!response2.ok) throw new Error('Analysis Resolution failed');

                    const reader = response2.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();
                        for (const line of lines) {
                            if (!line.trim()) continue;
                            try {
                                const event = JSON.parse(line);
                                if (event.type === 'pdf') {
                                    setResult(p => ({
                                        ...(p || {}),
                                        pdf_url: event.pdf_url,
                                        pdf_path: event.pdf_path
                                    }));
                                    setActiveTab('overflow');
                                }
                                else if (event.type === 'result') {
                                    // Mark all recommended actions as NOT manual
                                    const actionsWithFlags = { ...event.actions };
                                    for (const id in actionsWithFlags) {
                                        const existing = (prevResultRef && prevResultRef.current && prevResultRef.current.actions) ? prevResultRef.current.actions[id] : {};
                                        actionsWithFlags[id] = {
                                            ...actionsWithFlags[id],
                                            is_manual: false,
                                            is_islanded: (existing && existing.is_islanded !== undefined) ? existing.is_islanded : actionsWithFlags[id].is_islanded,
                                            estimated_max_rho: (existing && existing.estimated_max_rho !== undefined) ? existing.estimated_max_rho : actionsWithFlags[id].max_rho,
                                            estimated_max_rho_line: (existing && existing.estimated_max_rho_line !== undefined) ? existing.estimated_max_rho_line : actionsWithFlags[id].max_rho_line,
                                        };
                                    }
                                    setSuggestedByRecommenderIds(prev => new Set([...prev, ...Object.keys(actionsWithFlags)]));
                                    setPendingAnalysisResult({ ...event, actions: actionsWithFlags });
                                    if (event.message) setInfoMessage(event.message);
                                }
                                else if (event.type === 'error') setError('Analysis failed: ' + event.message);
                            } catch (e) {
                                console.error('Stream error:', e);
                            }
                        }
                    }
                    setAnalysisRan(true);
                } catch (err) {
                    setError('Analysis failed: ' + (err.response?.data?.detail || err.message));
                } finally {
                    setAnalysisLoading(false);
                }
            };

            // Merge pending analysis result with existing manual actions
            const handleDisplayPrioritizedActions = () => {
                if (!pendingAnalysisResult) return;
                setResult(prev => {
                    // Preserve manually added actions via is_manual flag
                    const manualActionsData = {};
                    if (prev?.actions) {
                        for (const [id, data] of Object.entries(prev.actions)) {
                            if (data.is_manual) {
                                manualActionsData[id] = data;
                            }
                        }
                    }
                    const actionsData = {};
                    if (pendingAnalysisResult?.actions) {
                        for (const [id, data] of Object.entries(pendingAnalysisResult.actions)) {
                            const existing = prev?.actions?.[id] || {};
                            actionsData[id] = {
                                ...data,
                                is_manual: false,
                                is_islanded: (existing && existing.is_islanded !== undefined) ? existing.is_islanded : data.is_islanded,
                                estimated_max_rho: (existing && existing.estimated_max_rho !== undefined) ? existing.estimated_max_rho : data.max_rho,
                                estimated_max_rho_line: (existing && existing.estimated_max_rho_line !== undefined) ? existing.estimated_max_rho_line : data.max_rho_line,
                            };
                        }
                    }
                    const combinedActionsData = {};
                    if (pendingAnalysisResult?.combined_actions) {
                        for (const [id, data] of Object.entries(pendingAnalysisResult.combined_actions)) {
                            const canonicalId = canonicalizeId(id);
                            const existing = prev?.actions?.[canonicalId] || {};
                            combinedActionsData[canonicalId] = {
                                ...data,
                                is_manual: false,
                                is_precomputed: true,
                                is_estimated: existing.is_estimated ?? true,
                                is_islanded: existing.is_islanded ?? data.is_islanded,
                                // Store estimation in separate fields to avoid collision with simulation data
                                estimated_max_rho: existing.estimated_max_rho ?? (data.estimated_max_rho ?? data.max_rho),
                                estimated_max_rho_line: existing.estimated_max_rho_line ?? (data.estimated_max_rho_line ?? data.max_rho_line),
                                description_unitaire: data.description || `Combination of ${data.action1_id} and ${data.action2_id}`
                            };
                        }
                    }
                    return {
                        ...prev,
                        ...pendingAnalysisResult,
                        actions: { ...actionsData, ...combinedActionsData, ...manualActionsData },
                    };
                });
                setPendingAnalysisResult(null);
            };

            // Fetch action variant diagram when an action card is clicked
            const handleActionSelect = async (actionId) => {

                if (actionId === selectedActionId) {
                    // Deselect — return to previous diagram tab
                    setSelectedActionId(null);
                    setActionDiagram(null);
                    setActiveTab('n-1');
                    return;
                }

                // Capture current viewBox so we can re-apply it after the
                // action diagram loads (the tab-switch sync fires before
                // the SVG exists, then usePanZoom resets to the native
                // viewBox — we need to override that).
                actionSyncSourceRef.current =
                    (activeTabRef.current === 'action' ? actionPZ.viewBox : null)
                    || n1PZ.viewBox || nPZ.viewBox;

                setSelectedActionId(actionId);
                setActionDiagram(null);
                setActionDiagramLoading(true);
                setActiveTab('action');
                try {
                    const res = await axios.post(API_BASE + '/api/action-variant-diagram', { action_id: actionId });
                    const { svg, viewBox } = processSvg(res.data.svg, voltageLevels.length);
                    setActionDiagram({ ...res.data, svg, originalViewBox: viewBox });
                } catch (err) {
                    // Diagram not in backend memory (e.g. after session restore) — simulate first
                    if (selectedBranch) {
                        try {
                            // Pass action_topology so the backend can reconstruct actions
                            // not in the dictionary (e.g. node_merging actions from analysis)
                            // For combined actions (a+b), pass per-component topologies
                            let actionContent = null;
                            if (actionId.includes('+')) {
                                const parts = actionId.split('+');
                                const perAction = {};
                                for (const part of parts) {
                                    const partDetail = result?.actions?.[part];
                                    if (partDetail?.action_topology) perAction[part] = partDetail.action_topology;
                                }
                                if (Object.keys(perAction).length > 0) actionContent = perAction;
                            } else {
                                const actionDetail = result?.actions?.[actionId];
                                actionContent = actionDetail?.action_topology || null;
                            }
                            const simRes = await axios.post(API_BASE + '/api/simulate-manual-action', {
                                action_id: actionId, disconnected_element: selectedBranch,
                                action_content: actionContent,
                                lines_overloaded: result?.lines_overloaded?.length > 0 ? result.lines_overloaded : null,
                            });
                            const detail = simRes.data;
                            // Update the action detail with fresh simulation data,
                            // but preserve existing rho values from the original analysis
                            // (the simulation may use different monitored line indices)
                            setResult(prev => {
                                if (!prev) return prev;
                                const existing = prev.actions[actionId] || {};
                                const hasRho = existing.rho_before?.length > 0;
                                return {
                                    ...prev,
                                    actions: {
                                        ...prev.actions,
                                        [actionId]: {
                                            ...existing,
                                            description_unitaire: existing.description_unitaire || detail.description_unitaire,
                                            rho_before: hasRho ? existing.rho_before : detail.rho_before,
                                            rho_after: hasRho ? existing.rho_after : detail.rho_after,
                                            max_rho: hasRho ? existing.max_rho : detail.max_rho,
                                            max_rho_line: hasRho ? existing.max_rho_line : detail.max_rho_line,
                                            is_rho_reduction: hasRho ? existing.is_rho_reduction : detail.is_rho_reduction,
                                            non_convergence: detail.non_convergence,
                                            is_islanded: detail.is_islanded,
                                            n_components: detail.n_components,
                                            disconnected_mw: detail.disconnected_mw,
                                        },
                                    },
                                };
                            });
                            // Now try fetching the diagram again
                            const res2 = await axios.post(API_BASE + '/api/action-variant-diagram', { action_id: actionId });
                            const { svg, viewBox } = processSvg(res2.data.svg, voltageLevels.length);
                            setActionDiagram({ ...res2.data, svg, originalViewBox: viewBox });
                        } catch (simErr) {
                            console.error('Failed to simulate and fetch diagram for', actionId, simErr);
                            setError('Failed to load action diagram for ' + actionId);
                        }
                    } else {
                        console.error('Failed to fetch action variant diagram:', err);
                        setError('Failed to fetch action variant diagram for ' + actionId);
                    }
                } finally {
                    setActionDiagramLoading(false);
                }
            };

            const handleActionFavorite = (actionId) => {
                setManualActionIds(prev => {
                    const next = new Set(prev);
                    next.add(actionId);
                    return next;
                });
                setResult(prev => {
                    if (!prev || !prev.actions[actionId]) return prev;
                    return {
                        ...prev,
                        actions: {
                            ...prev.actions,
                            [actionId]: { ...prev.actions[actionId], is_manual: true }
                        }
                    };
                });
                setRejectedActionIds(prev => {
                    const next = new Set(prev);
                    next.delete(actionId);
                    return next;
                });
            };

            const handleActionReject = (actionId) => {
                setRejectedActionIds(prev => {
                    const next = new Set(prev);
                    next.add(actionId);
                    return next;
                });
                setManualActionIds(prev => {
                    const next = new Set(prev);
                    next.delete(actionId);
                    return next;
                });
                setManuallyAddedIds(prev => {
                    const next = new Set(prev);
                    next.delete(actionId);
                    return next;
                });
            };

            // ===== Asset Click (from action card badges / rho line names) =====
            const handleAssetClick = (actionId, assetName, tab = 'action') => {
                setInspectQuery(assetName);
                if (tab === 'n') {
                    setActiveTab('n');
                } else if (tab === 'n-1') {
                    setActiveTab('n-1');
                } else if (actionId !== selectedActionId) {
                    handleActionSelect(actionId);
                } else {
                    setActiveTab('action');
                }
            };

            // ===== VL Double-Click → Single Line Diagram overlay =====
            const handleVlDoubleClick = async (actionId, vlName) => {
                setOverlayTransform({ scale: 1, tx: 0, ty: 0 });
                setOverlayPos({ x: 16, y: 16 });
                // Determine initial SLD tab based on active main tab and Flow/Impact mode
                let initialTab;
                if (activeTab === 'n') {
                    initialTab = 'n';
                } else if (activeTab === 'n-1') {
                    initialTab = 'n-1';
                } else if (activeTab === 'action' && actionViewMode === 'delta') {
                    // Impacts mode: show Action state (the variant being compared)
                    initialTab = 'action';
                } else {
                    // Flows mode (action or overflow fallback): show action state
                    initialTab = 'action';
                }
                setVlOverlay({ vlName, actionId, svg: null, sldMetadata: null, loading: true, error: null, tab: initialTab });
                fetchSldVariant(vlName, actionId, initialTab);
            };

            const fetchSldVariant = async (vlName, actionId, sldTab) => {
                setVlOverlay(prev => prev ? { ...prev, loading: true, error: null, tab: sldTab } : null);
                try {
                    let endpoint = '';
                    let payload = {};
                    if (sldTab === 'n') {
                        endpoint = '/api/n-sld';
                        payload = { voltage_level_id: vlName };
                    } else if (sldTab === 'n-1') {
                        endpoint = '/api/n1-sld';
                        payload = { voltage_level_id: vlName, disconnected_element: selectedBranch };
                    } else {
                        endpoint = '/api/action-variant-sld';
                        payload = { action_id: actionId, voltage_level_id: vlName };
                    }
                    const res = await axios.post(API_BASE + endpoint, payload);
                    setVlOverlay(prev =>
                        prev && prev.vlName === vlName && prev.actionId === actionId && prev.tab === sldTab
                            ? {
                                ...prev, svg: res.data.svg, sldMetadata: res.data.sld_metadata ?? null, loading: false,
                                flow_deltas: res.data.flow_deltas, reactive_flow_deltas: res.data.reactive_flow_deltas, asset_deltas: res.data.asset_deltas
                            }
                            : prev
                    );
                } catch (err) {
                    setVlOverlay(prev => prev && prev.tab === sldTab
                        ? { ...prev, loading: false, error: err?.response?.data?.detail || 'Failed to load diagram' }
                        : prev
                    );
                }
            };

            // Wheel zoom on overlay body — must be non-passive to call preventDefault
            useEffect(() => {
                const el = overlayBodyRef.current;
                if (!el) return;
                const onWheel = (e) => {
                    e.preventDefault();
                    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
                    const rect = el.getBoundingClientRect();
                    const cx = e.clientX - rect.left;
                    const cy = e.clientY - rect.top;
                    setOverlayTransform(prev => {
                        const s = Math.max(0.1, Math.min(10, prev.scale * factor));
                        return {
                            scale: s,
                            tx: cx - (cx - prev.tx) * (s / prev.scale),
                            ty: cy - (cy - prev.ty) * (s / prev.scale),
                        };
                    });
                };
                el.addEventListener('wheel', onWheel, { passive: false });
                return () => el.removeEventListener('wheel', onWheel);
            }, [vlOverlay]);

            // Apply / clear SLD delta flow colors whenever svg/metadata, tab, or mode changes.
            // Uses pypowsybl SLD metadata (nodes/feederInfos equipmentId → id) to find
            // the exact SVG element, then walks up to sld-extern-cell to color the full branch
            // including its connecting wire.
            useEffect(() => {
                const container = overlayBodyRef.current;
                if (!container) return;

                // Clear any previously applied SLD delta classes
                const SLD_DELTA_CLASSES = [
                    'sld-delta-positive', 'sld-delta-negative', 'sld-delta-grey',
                    'sld-delta-text-positive', 'sld-delta-text-negative', 'sld-delta-text-grey'
                ];
                container.querySelectorAll(SLD_DELTA_CLASSES.map(c => '.' + c).join(','))
                    .forEach(el => el.classList.remove(...SLD_DELTA_CLASSES));

                // Restore original text labels
                container.querySelectorAll('[data-original-text]').forEach(el => {
                    el.textContent = el.getAttribute('data-original-text');
                    el.removeAttribute('data-original-text');
                });

                // Restore flipped arrow directions (sld-in ↔ sld-out)
                container.querySelectorAll('[data-arrow-flipped]').forEach(el => {
                    if (el.classList.contains('sld-in')) {
                        el.classList.replace('sld-in', 'sld-out');
                    } else if (el.classList.contains('sld-out')) {
                        el.classList.replace('sld-out', 'sld-in');
                    }
                    el.removeAttribute('data-arrow-flipped');
                });

                if (!vlOverlay?.svg || actionViewMode !== 'delta') return;

                const flowDeltas = vlOverlay.flow_deltas;
                const reactiveDeltas = vlOverlay.reactive_flow_deltas;
                const assetDeltas = vlOverlay.asset_deltas;

                if (!flowDeltas && !assetDeltas) return;

                // Build equipmentId → [svgId, ...] multimap from SLD metadata.
                // pypowsybl SLD metadata uses 'nodes' (for lines, transformers, breakers,
                // bus-bar sections) and 'feederInfos' (for ARROW_ACTIVE/ARROW_REACTIVE).
                // Older versions may use 'feederNodes' instead.
                const equipIdToSvgIds = new Map();
                if (vlOverlay.sldMetadata) {
                    try {
                        const meta = JSON.parse(vlOverlay.sldMetadata);
                        const sources = [
                            ...(meta.nodes ?? []),
                            ...(meta.feederInfos ?? []),
                            ...(meta.feederNodes ?? []),
                        ];
                        for (const fn of sources) {
                            if (fn.equipmentId && fn.id) {
                                const ids = equipIdToSvgIds.get(fn.equipmentId) ?? [];
                                ids.push(fn.id);
                                equipIdToSvgIds.set(fn.equipmentId, ids);
                            }
                        }
                    } catch { /* ignore parse errors */ }
                }

                const elMap = getIdMap(container);

                const lookupById = (svgId) =>
                    elMap.get(svgId)
                    ?? elMap.get(svgId.replace(/\./g, '_'))
                    ?? elMap.get(svgId.replace(/_/g, '.'));

                const lookupDelta = (rec, key) => {
                    if (!rec) return undefined;
                    if (rec[key] !== undefined) return rec[key];
                    const dotted = key.replace(/_/g, '.');
                    if (dotted !== key && rec[dotted] !== undefined) return rec[dotted];
                    const underscored = key.replace(/\./g, '_');
                    if (underscored !== key && rec[underscored] !== undefined) return rec[underscored];
                    return undefined;
                };

                const fmtDelta = v => v >= 0 ? `+${v.toFixed(1)}` : v.toFixed(1);

                /** Flip arrow direction within a specific power-type scope.
                 *  pypowsybl SLD SVGs use .sld-in / .sld-out classes to control
                 *  which arrow (.sld-arrow-in / .sld-arrow-out) is visible.
                 *  P and Q arrows are flipped independently by scoping to
                 *  .sld-active-power or .sld-reactive-power. */
                const flipArrows = (cellEl, scopeClass) => {
                    const sel = `.${scopeClass} .sld-in, .${scopeClass} .sld-out, .${scopeClass}.sld-in, .${scopeClass}.sld-out`;
                    cellEl.querySelectorAll(sel).forEach(el => {
                        if (el.hasAttribute('data-arrow-flipped')) return;
                        if (el.classList.contains('sld-in')) {
                            el.classList.replace('sld-in', 'sld-out');
                        } else {
                            el.classList.replace('sld-out', 'sld-in');
                        }
                        el.setAttribute('data-arrow-flipped', '1');
                    });
                };

                const applyTextDelta = (label, val) => {
                    if (!label.hasAttribute('data-original-text')) {
                        label.setAttribute('data-original-text', label.textContent || '');
                    }
                    label.textContent = `\u0394 ${val}`;
                };

                const replaceFirstNumericLabel = (labels, val) => {
                    for (const label of Array.from(labels)) {
                        if (/^-?\d+(\.\d+)?$/.test((label.textContent || '').trim())) {
                            applyTextDelta(label, val);
                            return;
                        }
                    }
                };

                const walkUpToCell = (feederEl) => {
                    let cellEl = feederEl;
                    let cur = feederEl.parentElement;
                    while (cur && cur !== container) {
                        if (cur.classList.contains('sld-extern-cell') ||
                            cur.classList.contains('sld-intern-cell') ||
                            cur.classList.contains('sld-shunt-cell')) {
                            cellEl = cur;
                            break;
                        }
                        cur = cur.parentElement;
                    }
                    return cellEl;
                };

                const findCellEl = (equipId) => {
                    let feederEl = null;
                    const svgIds = equipIdToSvgIds.get(equipId)
                        ?? equipIdToSvgIds.get(equipId.replace(/\./g, '_'))
                        ?? equipIdToSvgIds.get(equipId.replace(/_/g, '.'));
                    if (svgIds) {
                        for (const svgId of svgIds) {
                            feederEl = lookupById(svgId);
                            if (feederEl) break;
                        }
                    }
                    if (!feederEl) {
                        const sanitized = equipId.replace(/\./g, '_');
                        for (const [eid, el] of elMap) {
                            if (eid.includes(equipId) || (sanitized !== equipId && eid.includes(sanitized))) {
                                feederEl = el; break;
                            }
                        }
                    }
                    if (!feederEl) return null;
                    return walkUpToCell(feederEl);
                };

                // --- Branch (line/transformer) deltas ---
                // Helper to apply P & Q delta text to a cell element
                const applyPQLabels = (cellEl, pStr, qStr) => {
                    let pLabels = cellEl.querySelectorAll('.sld-active-power .sld-label');
                    if (pLabels.length === 0) pLabels = cellEl.querySelectorAll('.sld-label');
                    replaceFirstNumericLabel(pLabels, pStr);

                    if (qStr !== null) {
                        const qLabels = cellEl.querySelectorAll('.sld-reactive-power .sld-label');
                        if (qLabels.length > 0) {
                            replaceFirstNumericLabel(qLabels, qStr);
                        } else {
                            replaceFirstNumericLabel(cellEl.querySelectorAll('.sld-label'), qStr);
                        }
                    }
                };

                // Iterate ALL feeders from SLD metadata so we process branches, loads,
                // and generators — not just equipment IDs found in flow_deltas.
                const processedEquipIds = new Set();

                for (const [equipId, svgIds] of equipIdToSvgIds) {
                    let feederEl = null;
                    for (const svgId of svgIds) {
                        feederEl = lookupById(svgId);
                        if (feederEl) break;
                    }
                    if (!feederEl) continue;

                    const cellEl = walkUpToCell(feederEl);

                    const branchDelta = lookupDelta(flowDeltas, equipId);
                    if (branchDelta) {
                        cellEl.classList.add(`sld-delta-${branchDelta.category}`);
                        const pDeltaVal = branchDelta.delta;
                        const pStr = fmtDelta(pDeltaVal);

                        const qDelta = lookupDelta(reactiveDeltas, equipId);
                        const qStr = qDelta !== undefined ? fmtDelta(qDelta.delta) : null;

                        // Always apply labels to ensure original flows are replaced
                        applyPQLabels(cellEl, pStr, qStr);

                        // Apply specific category classes to the labels instead of the cell
                        let pLabels = cellEl.querySelectorAll('.sld-active-power .sld-label');
                        if (pLabels.length === 0) pLabels = cellEl.querySelectorAll('.sld-label');
                        pLabels.forEach(l => l.classList.add(`sld-delta-text-${branchDelta.category}`));

                        if (qDelta) {
                            cellEl.querySelectorAll('.sld-reactive-power .sld-label').forEach(l => l.classList.add(`sld-delta-text-${qDelta.category}`));
                        }

                        // Flip P and Q arrows independently (regardless of category)
                        if (branchDelta.flip_arrow) {
                            flipArrows(cellEl, 'sld-active-power');
                        }
                        if (qDelta && qDelta.flip_arrow) {
                            flipArrows(cellEl, 'sld-reactive-power');
                        }
                        processedEquipIds.add(equipId);
                        continue;
                    }

                    const assetDelta = lookupDelta(assetDeltas, equipId);
                    if (assetDelta) {
                        cellEl.classList.add(`sld-delta-${assetDelta.category}`);
                        const pStr = fmtDelta(assetDelta.delta_p);
                        const qStr = fmtDelta(assetDelta.delta_q);
                        // Always apply labels to ensure original flows are replaced
                        applyPQLabels(cellEl, pStr, qStr);

                        const catP = assetDelta.category_p || assetDelta.category;
                        const catQ = assetDelta.category_q || assetDelta.category;

                        cellEl.querySelectorAll('.sld-active-power .sld-label').forEach(l => l.classList.add(`sld-delta-text-${catP}`));
                        cellEl.querySelectorAll('.sld-reactive-power .sld-label').forEach(l => l.classList.add(`sld-delta-text-${catQ}`));

                        processedEquipIds.add(equipId);
                    }
                }

                const isProcessed = (id) =>
                    processedEquipIds.has(id)
                    || processedEquipIds.has(id.replace(/\./g, '_'))
                    || processedEquipIds.has(id.replace(/_/g, '.'));

                // Fallback: process any deltas keys not found via metadata
                for (const [equipId, delta] of Object.entries(flowDeltas ?? {})) {
                    if (isProcessed(equipId)) continue;
                    const cellEl = findCellEl(equipId);
                    if (!cellEl) continue;
                    const pStr = fmtDelta(delta.delta);
                    const qDelta = lookupDelta(reactiveDeltas, equipId);
                    const qStr = qDelta !== undefined ? fmtDelta(qDelta.delta) : null;

                    // Always apply labels to ensure original flows are replaced
                    applyPQLabels(cellEl, pStr, qStr);

                    let pLabels = cellEl.querySelectorAll('.sld-active-power .sld-label');
                    if (pLabels.length === 0) pLabels = cellEl.querySelectorAll('.sld-label');
                    pLabels.forEach(l => l.classList.add(`sld-delta-text-${delta.category}`));

                    if (qDelta) {
                        cellEl.querySelectorAll('.sld-reactive-power .sld-label').forEach(l => l.classList.add(`sld-delta-text-${qDelta.category}`));
                    }

                    if (delta.flip_arrow) flipArrows(cellEl, 'sld-active-power');
                    const qDeltaForFlip = lookupDelta(reactiveDeltas, equipId);
                    if (qDeltaForFlip && qDeltaForFlip.flip_arrow) flipArrows(cellEl, 'sld-reactive-power');
                }
                for (const [equipId, assetDelta] of Object.entries(assetDeltas ?? {})) {
                    if (isProcessed(equipId)) continue;
                    if (lookupDelta(flowDeltas, equipId) !== undefined) continue;
                    const cellEl = findCellEl(equipId);
                    if (!cellEl) continue;

                    if (assetDelta.category !== 'grey' || (assetDelta.category_q && assetDelta.category_q !== 'grey')) {
                        cellEl.classList.add(`sld-delta-${assetDelta.category}`);
                        const pStr = fmtDelta(assetDelta.delta_p);
                        const qStr = fmtDelta(assetDelta.delta_q);
                        // Always apply labels to ensure original flows are replaced
                        applyPQLabels(cellEl, pStr, qStr);

                        const catP = assetDelta.category_p || assetDelta.category;
                        const catQ = assetDelta.category_q || assetDelta.category;

                        cellEl.querySelectorAll('.sld-active-power .sld-label').forEach(l => l.classList.add(`sld-delta-text-${catP}`));
                        cellEl.querySelectorAll('.sld-reactive-power .sld-label').forEach(l => l.classList.add(`sld-delta-text-${catQ}`));
                    }
                }
            }, [vlOverlay?.svg, vlOverlay?.sldMetadata, vlOverlay?.tab, actionViewMode,
            vlOverlay?.flow_deltas, vlOverlay?.reactive_flow_deltas, vlOverlay?.asset_deltas]);

            // Mouse pan inside overlay body
            const startOverlayPan = (e) => {
                if (e.button !== 0) return;

                const tx0 = overlayTransform.tx, ty0 = overlayTransform.ty;
                const onMove = (ev) => setOverlayTransform(prev => ({
                    ...prev, tx: tx0 + ev.clientX - x0, ty: ty0 + ev.clientY - y0,
                }));
                const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            };

            // Drag the overlay window by its title bar

            const startOverlayDrag = (e) => {
                if (e.button !== 0) return;

                const x0 = e.clientX, y0 = e.clientY;
                const px0 = overlayPos.x, py0 = overlayPos.y;
                const TITLE_H = 32; // approx title bar height in px
                const WIN_W = 440;  // overlay width in px
                const onMove = (ev) => {
                    let nx = px0 + ev.clientX - x0;

                        const { width, height } = vizContainerRef.current.getBoundingClientRect();
                        // Keep at least 60 px of the header visible on each horizontal side
                        nx = Math.max(-(WIN_W - 60), Math.min(nx, width - 60));
                        // Keep top edge inside container, bottom not below last visible title row
                        ny = Math.max(0, Math.min(ny, height - TITLE_H));
                    }
                    setOverlayPos({ x: nx, y: ny });
                };
                const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            };

            // --- Manual Action Search Logic ---
            const handleOpenSearch = async () => {
                if (searchOpen) { setSearchOpen(false); return; }
                setSearchOpen(true);
                setSearchQuery('');
                setSearchError('');
                if (availableActions.length === 0) {
                    setLoadingAvailableActions(true);
                    try {
                        const res = await axios.get(API_BASE + '/api/actions');
                        setAvailableActions(res.data.actions || []);

                        setSearchError('Failed to load actions');
                    } finally {
                        setLoadingAvailableActions(false);
                    }
                }
                setTimeout(() => searchInputRef.current?.focus(), 50);
            };

            const canonicalizeId = (id) => {
                if (!id || typeof id !== 'string' || !id.includes('+')) return id;
                return id.split('+').map(p => p.trim()).sort().join('+');
            };

            const handleAddManualAction = async (rawActionId) => {
                const actionId = canonicalizeId(rawActionId);
                if (!selectedBranch) { setSearchError('Run an analysis first'); return; }
                if (simulatingActionId) return; // Prevent concurrent simulations
                console.log('[handleAddManualAction] Starting simulation for:', actionId);
                setSimulatingActionId(actionId);
                setSearchError('');

                try {
                    // Build action_content from saved topologies so the backend can
                    // reconstruct actions not in the dictionary (e.g. node_merging,
                    // coupling actions generated during analysis).
                    let actionContent = null;
                    if (actionId.includes('+')) {
                        const parts = actionId.split('+');
                        const perAction = {};
                        for (const part of parts) {
                            const partDetail = result?.actions?.[part];
                            if (partDetail?.action_topology) perAction[part] = partDetail.action_topology;
                        }
                        if (Object.keys(perAction).length > 0) actionContent = perAction;
                    } else {
                        const actionDetail = result?.actions?.[actionId];
                        actionContent = actionDetail?.action_topology || null;
                    }

                    const res = await axios.post(API_BASE + '/api/simulate-manual-action', {
                        action_id: actionId,
                        disconnected_element: selectedBranch,
                        action_content: actionContent,
                        lines_overloaded: result?.lines_overloaded?.length > 0 ? result.lines_overloaded : null,
                    });
                    console.log('[handleAddManualAction] Simulation result received:', res.data);
                    const detail = res.data;

                    // Track this as a manually added action
                    setManualActionIds(prev => new Set([...prev, actionId]));
                    setManuallyAddedIds(prev => new Set([...prev, actionId]));

                    const isCombined = actionId.includes('+');

                    // Merge into result
                    setResult(prev => {
                        const base = prev || { actions: {}, lines_overloaded: [] };
                        return {
                            ...base,
                            lines_overloaded: (base.lines_overloaded && base.lines_overloaded.length > 0) ? base.lines_overloaded : (detail.lines_overloaded || []),
                            actions: {
                                ...(base.actions || {}),
                                [actionId]: {
                                    ...(base.actions?.[actionId] || {}), // Keep existing betas/estimations if present
                                    description_unitaire: detail.description_unitaire || (isCombined ? `Combination action results` : ''),
                                    rho_before: detail.rho_before,
                                    rho_after: detail.rho_after,
                                    max_rho: detail.max_rho,
                                    max_rho_line: detail.max_rho_line,
                                    is_rho_reduction: detail.is_rho_reduction,
                                    is_manual: true,
                                    is_estimated: false,
                                    is_islanded: detail.is_islanded,
                                    n_components: detail.n_components,
                                    disconnected_mw: detail.disconnected_mw,
                                    non_convergence: detail.non_convergence,
                                    is_precomputed: isCombined ? true : (base.actions?.[actionId]?.is_precomputed || false)
                                }
                            }
                        };
                    });
                    setSearchOpen(false);
                    setSearchQuery('');

                    // Fetch the action diagram AFTER simulation completes (ensures post-action state is ready)
                    try {
                        const diagRes = await axios.post(API_BASE + '/api/action-variant-diagram', { action_id: actionId });
                        const { svg, viewBox } = processSvg(diagRes.data.svg, voltageLevels.length);
                        const prefetched = { ...diagRes.data, svg, originalViewBox: viewBox };

                        actionSyncSourceRef.current =
