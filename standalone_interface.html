                        console.error('Failed to fetch action variant diagram:', diagErr);
                        handleActionSelect(actionId); // Fallback to normal selection logic
                    }
                } catch (err) {
                    console.error('Simulation failed:', err);
                    setSearchError(err?.response?.data?.detail || 'Simulation failed');
                } finally {
                    setSimulatingActionId(null);
                }
            };

            const handleOpenCombineModal = () => {
                setSelectedCombineActionIds([]);
                setSuperpositionResult(null);
                setCombinedSimulationFeedback(null);
                setCombineModalTab('computed');
                setIsCombineModalOpen(true);
            };

            const toggleActionSelection = (actionId) => {
                setSuperpositionResult(null);
                setCombinedSimulationFeedback(null);
                setSelectedCombineActionIds(prev => {
                    if (prev.includes(actionId)) {
                        return prev.filter(id => id !== actionId);
                    }
                    if (prev.length >= 2) return prev;
                    return [...prev, actionId];
                });
            };

            // Removed auto-compute. User will click explicit Estimate button.

            const handleComputeSuperposition = async () => {
                if (selectedCombineActionIds.length !== 2) return;
                setIsComputingSuperposition(true);
                setCombinedSimulationFeedback(null);
                try {
                    const res = await axios.post(API_BASE + '/api/compute-superposition', {
                        action1_id: selectedCombineActionIds[0],
                        action2_id: selectedCombineActionIds[1],
                        disconnected_element: selectedBranch
                    });
                    const combinedId = canonicalizeId(selectedCombineActionIds.join('+'));
                    setSuperpositionResult(res.data);

                    // Feed the first tab with estimated result
                    setResult(prev => {
                        if (!prev) return prev;
                        const combinedId = canonicalizeId(selectedCombineActionIds.join('+'));
                        const existing = prev.actions?.[combinedId] || {};
                        return {
                            ...prev,
                            actions: {
                                ...prev.actions,
                                [combinedId]: {
                                    ...res.data,
                                    is_manual: true,
                                    is_estimated: true,
                                    is_islanded: existing.is_islanded ?? res.data.is_islanded,
                                    // Store as explicit estimation fields, preserving if they somehow exist
                                    estimated_max_rho: existing.estimated_max_rho ?? res.data.max_rho,
                                    estimated_max_rho_line: existing.estimated_max_rho_line ?? res.data.max_rho_line,
                                    description_unitaire: `[ESTIMATED] Combination of ${selectedCombineActionIds.join(' and ')}`
                                }
                            }
                        };
                    });
                } catch (err) {
                    const errMsg = err.response?.data?.detail || err.message || JSON.stringify(err);
                    setError('Failed to compute superposition: ' + errMsg);
                } finally {
                    setIsComputingSuperposition(false);
                }
            };

            const handleSimulateUnitaryFromModal = async (actionId) => {
                setSimulatingActionId(actionId);
                try {
                    const res = await axios.post(API_BASE + '/api/simulate-manual-action', {
                        action_id: actionId,
                        disconnected_element: selectedBranch
                    });
                    const detail = res.data;
                    setManualActionIds(prev => new Set([...prev, actionId]));
                    setManuallyAddedIds(prev => new Set([...prev, actionId]));
                    setResult(prev => {
                        const base = prev || { actions: {}, lines_overloaded: [] };
                        return {
                            ...base,
                            actions: {
                                ...(base.actions || {}),
                                [actionId]: {

                                    max_rho: detail.max_rho,
                                    max_rho_line: detail.max_rho_line,
                                    is_rho_reduction: detail.is_rho_reduction,
                                    is_manual: true,

                            }
                        };
                    });
                    // DO NOT close modal as per requirement
                    setInfoMessage(`Unitary action ${actionId} simulated successfully.`);
                    setTimeout(() => setInfoMessage(null), 3000);
                } catch (err) {
                    setError('Failed to simulate unitary action: ' + (err.response?.data?.detail || err.message));
                } finally {
                    setSimulatingActionId(null);
                }
            };

            const handleSimulateCombined = async (rawActionIds = selectedCombineActionIds) => {
                if (rawActionIds.length !== 2) return;
                const combinedId = canonicalizeId(rawActionIds.join('+'));
                if (simulatingActionId) return; // Prevent concurrent simulations
                setSimulatingActionId(combinedId);
                setIsSimulatingCombined(true);
                setCombinedSimulationFeedback(null);
                try {
                    setManualActionIds(prev => new Set([...prev, combinedId]));
                    setManuallyAddedIds(prev => new Set([...prev, combinedId]));

                    const res = await axios.post(API_BASE + '/api/simulate-manual-action', {
                        action_id: combinedId,
                        disconnected_element: selectedBranch
                    });
                    const detail = res.data;

                    // Store simulation feedback for display in the modal
                    setCombinedSimulationFeedback({
                        max_rho: detail.max_rho,
                        max_rho_line: detail.max_rho_line,
                        is_rho_reduction: detail.is_rho_reduction,
                        is_islanded: detail.is_islanded,
                        disconnected_mw: detail.disconnected_mw,
                        non_convergence: detail.non_convergence,

                    // Also update result.actions with the full simulation data
                    setResult(prev => {
                        const base = prev || { actions: {}, lines_overloaded: [] };
                        return {
                            ...base,
                            lines_overloaded: (base.lines_overloaded && base.lines_overloaded.length > 0) ? base.lines_overloaded : (detail.lines_overloaded || []),
                            actions: {
                                ...(base.actions || {}),
                                [combinedId]: {
                                    ...(base.actions?.[combinedId] || {}),
                                    description_unitaire: detail.description_unitaire,
                                    rho_before: detail.rho_before,
                                    rho_after: detail.rho_after,
                                    max_rho: detail.max_rho,
                                    max_rho_line: detail.max_rho_line,
                                    is_rho_reduction: detail.is_rho_reduction,
                                    is_manual: true,

                    setSimulatingActionId(null);
                    setIsSimulatingCombined(false);

            };

            // Close search dropdown on outside click
            useEffect(() => {
                if (!searchOpen) return;

                    if (searchDropdownRef.current && !searchDropdownRef.current.contains(e.target)) {

                };
